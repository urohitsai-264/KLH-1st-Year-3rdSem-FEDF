<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Movie Booking Dashboard</title>
  <link rel="stylesheet" href="movieDashboard.css">
</head>
<body>
  <h1>Movie Booking Dashboard</h1>
  <div id="controls">
    <button onclick="renderDirect()">Direct DOM: Full re-render</button>
    <button onclick="renderVirtual()">Virtual DOM: Partial update</button>
  </div>
  <div class="stats">
    Direct DOM operations: <span id="directCount">0</span> | Virtual DOM operations: <span id="virtualCount">0</span>
  </div>
  <div id="movieGrid" class="grid"></div>

  <script src="movieDashboard.js"></script>
</body>
</html>
